<section id="lernfelder" class="sr-section">
  <div class="sr-container space-y-10">
    <app-section-heading
      eyebrow="Was wir vermitteln"
      title="Lernfelder, die auf echte Arbeitsrealität einzahlen"
      intro="Die Inhalte sind so gewählt, dass sie Menschen nicht nur informieren, sondern ihre berufliche Anschlussfähigkeit konkret stärken."
    />

    <div class="grid gap-5 lg:grid-cols-12">
      @for (pillar of pillars(); track pillar.title; let index = $index) {
        <mat-card
          appearance="outlined"
          class="sr-card rounded-[1.8rem] p-6 sm:p-7"
          [ngClass]="{
            'lg:col-span-7': index === 0,
            'lg:col-span-5': index === 1,
            'lg:col-span-4': index > 1
          }"
        >
          <span class="sr-chip">{{ pillar.label }}</span>
          <h3 class="mt-5 text-2xl font-semibold tracking-[-0.04em] text-[var(--sr-heading)]">
            {{ pillar.title }}
          </h3>
          <p class="mt-4 text-base leading-7 text-[var(--sr-text-muted)]">{{ pillar.text }}</p>

          <ul class="mt-6 space-y-3">
            @for (outcome of pillar.outcomes; track outcome) {
              <li class="flex gap-3 text-sm leading-6 text-[var(--sr-text-muted)]">
                <span class="mt-2 h-2 w-2 shrink-0 rounded-full bg-[var(--sr-blue)]"></span>
                <span>{{ outcome }}</span>
              </li>
            }
          </ul>
        </mat-card>
      }
    </div>
  </div>
</section>
