<section id="haltung" class="sr-section">
  <div class="sr-container">
    <div
      class="relative overflow-hidden rounded-[2rem] border border-[var(--sr-border)] bg-[rgba(255,255,255,0.86)] px-6 py-8 shadow-[0_24px_56px_rgba(9,23,47,0.06)] backdrop-blur sm:px-9 sm:py-10 xl:px-12 xl:py-12"
    >
      <div aria-hidden="true" class="sr-noise-grid opacity-50"></div>
      <div
        aria-hidden="true"
        class="sr-drift pointer-events-none absolute right-[-4rem] top-[-3rem] h-[18rem] w-[18rem] rounded-full bg-[radial-gradient(circle,rgba(var(--sr-blue-rgb),0.18)_0%,rgba(var(--sr-blue-rgb),0.08)_38%,transparent_68%)]"
      ></div>

      <div class="relative z-10 grid gap-10 xl:grid-cols-[0.82fr_1.18fr] xl:gap-16">
        <div class="space-y-6" srReveal srRevealFrom="left">
          <span class="sr-kicker">{{ content().eyebrow }}</span>
          <h2 class="sr-balance text-4xl font-semibold tracking-[-0.06em] text-[var(--sr-heading)] sm:text-5xl">
            {{ content().title }}
          </h2>
        </div>

        <div class="space-y-6" srReveal srRevealFrom="right" srRevealDelay="120ms">
          <p class="text-lg leading-8 text-[var(--sr-text-muted)]">
            {{ content().intro }}
          </p>
          <p class="text-xl leading-8 text-[var(--sr-heading)] sm:text-[1.45rem] sm:leading-9">
            {{ content().statement }}
          </p>
        </div>
      </div>

      <div class="relative z-10 mt-12 border-t border-[var(--sr-border)]">
        @for (point of content().points; track point.title; let index = $index) {
          <article
            class="grid gap-4 border-b border-[var(--sr-border)] py-6 lg:grid-cols-[12rem_1fr] lg:gap-8"
            srReveal
            [srRevealDelay]="index * 90"
          >
            <div class="flex items-start gap-4">
              <span class="mt-1 inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full border border-[var(--sr-border-strong)] text-xs font-semibold text-[var(--sr-heading)]">
                0{{ index + 1 }}
              </span>
              <h3 class="text-xl font-semibold tracking-[-0.04em] text-[var(--sr-heading)]">
                {{ point.title }}
              </h3>
            </div>

            <p class="max-w-[42rem] text-base leading-8 text-[var(--sr-text-muted)]">
              {{ point.text }}
            </p>
          </article>
        }
      </div>

      <p
        class="relative z-10 mt-8 max-w-[58rem] text-lg leading-8 text-[var(--sr-text-muted)]"
        srReveal
        srRevealFrom="scale"
        srRevealDelay="180ms"
      >
        {{ content().closing }}
      </p>
    </div>
  </div>
</section>
