<section id="proof" class="sr-section">
  <div class="sr-container space-y-10">
    <app-section-heading
      eyebrow="Vertrauen und Proof"
      title="Substanz statt großer Behauptungen"
      intro="Solange Referenzen und Fallstudien noch aufgebaut werden, zeigt die Website bewusst konkrete Formatlogik und realistische Ergebnisse statt überzogener Erfolgsgeschichten."
    />

    <div class="grid gap-5 lg:grid-cols-3">
      @for (stat of stats(); track stat.label) {
        <article class="rounded-[1.7rem] border border-[var(--sr-border)] bg-white/[0.78] p-6 backdrop-blur-xl">
          <p class="text-2xl font-semibold tracking-[-0.05em] text-[var(--sr-heading)]">
            {{ stat.value }}
          </p>
          <p class="mt-3 text-sm font-semibold uppercase tracking-[0.16em] text-[var(--sr-text-muted)]">
            {{ stat.label }}
          </p>
          <p class="mt-3 text-sm leading-6 text-[var(--sr-text-muted)]">{{ stat.detail }}</p>
        </article>
      }
    </div>

    <div class="grid gap-5 xl:grid-cols-3">
      @for (card of cards(); track card.title) {
        <mat-card appearance="outlined" class="sr-card rounded-[1.8rem] p-6 sm:p-7">
          <h3 class="text-2xl font-semibold tracking-[-0.04em] text-[var(--sr-heading)]">
            {{ card.title }}
          </h3>
          <p class="mt-4 text-base leading-7 text-[var(--sr-text-muted)]">{{ card.text }}</p>

          <ul class="mt-6 space-y-3">
            @for (point of card.points; track point) {
              <li class="flex gap-3 text-sm leading-6 text-[var(--sr-text-muted)]">
                <span class="mt-2 h-2 w-2 shrink-0 rounded-full bg-[var(--sr-green)]"></span>
                <span>{{ point }}</span>
              </li>
            }
          </ul>
        </mat-card>
      }
    </div>
  </div>
</section>
