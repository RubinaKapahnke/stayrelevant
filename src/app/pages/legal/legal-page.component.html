<app-page-shell mode="simple">
  <section class="sr-section">
    <div class="sr-container">
      <div class="max-w-3xl space-y-8">
        <span class="sr-kicker">{{ content().title }}</span>
        <div class="space-y-5">
          <h1 class="sr-balance text-4xl font-semibold tracking-[-0.06em] text-[var(--sr-heading)] sm:text-5xl">
            {{ content().title }}
          </h1>
          <p class="text-lg leading-8 text-[var(--sr-text-muted)]">{{ content().lead }}</p>
        </div>

        <div class="space-y-5">
          @for (section of content().sections; track section.title) {
            <article class="sr-panel rounded-[1.7rem] p-6 sm:p-7">
              <h2 class="text-2xl font-semibold tracking-[-0.04em] text-[var(--sr-heading)]">
                {{ section.title }}
              </h2>
              <div class="mt-4 space-y-3 text-base leading-7 text-[var(--sr-text-muted)]">
                @for (paragraph of section.body; track paragraph) {
                  <p>{{ paragraph }}</p>
                }
              </div>
            </article>
          }
        </div>
      </div>
    </div>
  </section>
</app-page-shell>
